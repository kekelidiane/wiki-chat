name: publish

on:
  push:
    branches: [main, develop]

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.wearedigijob.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Both tags are pushed: argocd-image-updater tracks the 40-char sha
      # and ignores latest, which would be a moving target.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.wearedigijob.com/digijob/wiki-chatatest
            registry.wearedigijob.com/digijob/wiki-chat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
